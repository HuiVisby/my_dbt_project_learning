name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  dbt-run-and-test:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dbt-bigquery
        run: pip install dbt-bigquery

      - name: Write GCP credentials
        run: |
          mkdir -p ~/.dbt
          echo "${GCP_SERVICE_ACCOUNT_KEY}" > ~/.dbt/sa-key.json

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "my_first_project:" > ~/.dbt/profiles.yml
          echo "  target: dev" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    dev:" >> ~/.dbt/profiles.yml
          echo "      type: bigquery" >> ~/.dbt/profiles.yml
          echo "      method: service-account" >> ~/.dbt/profiles.yml
          echo "      project: ${GCP_PROJECT_ID}" >> ~/.dbt/profiles.yml
          echo "      dataset: dbt_ci" >> ~/.dbt/profiles.yml
          echo "      keyfile: /home/runner/.dbt/sa-key.json" >> ~/.dbt/profiles.yml
          echo "      location: EU" >> ~/.dbt/profiles.yml
          echo "      threads: 4" >> ~/.dbt/profiles.yml
          echo "      timeout_seconds: 300" >> ~/.dbt/profiles.yml

      - name: Check profiles.yml
        run: cat ~/.dbt/profiles.yml

      - name: Check secret lengths
        run: |
          echo "Project ID length: ${#GCP_PROJECT_ID}"
          echo "SA key length: ${#GCP_SERVICE_ACCOUNT_KEY}"

      - name: Run dbt
        run: dbt run

      - name: Test dbt
        run: dbt test
